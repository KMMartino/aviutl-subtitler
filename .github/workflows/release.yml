name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  backend:
    name: Backend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock-win.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock-win.txt
          python -m pip install -r requirements-dev.txt

      - name: Static analysis
        run: |
          python -m ruff check aviutl_subtitle.py subtitler tests
          python -m mypy

      - name: Unit tests
        run: python -m unittest discover -s tests

  windows:
    name: Build Windows distributables
    runs-on: windows-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint and formatting baseline
        working-directory: frontend
        run: |
          npm run lint
          npm run format:check

      - name: Release metadata tests
        working-directory: frontend
        run: npm run test:release-version

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Dependency audit
        working-directory: frontend
        run: npm audit

      - name: Apply release version
        working-directory: frontend
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:version

      - name: Build installer and portable app
        working-directory: frontend
        run: npm run dist

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+.*$') {
            throw "Release tag must look like v0.1.1, got: $env:RELEASE_TAG"
          }

          $releaseDir = Join-Path $PWD "release"
          $installerSource = Join-Path $releaseDir "SubUtlSetup$version.exe"
          $portableSource = Join-Path $releaseDir "SubUtl$version.exe"

          if (!(Test-Path $installerSource)) {
            throw "Installer artifact not found: $installerSource"
          }
          if (!(Test-Path $portableSource)) {
            throw "Portable artifact not found: $portableSource"
          }

          $assetDir = Join-Path $env:RUNNER_TEMP "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          $installer = Join-Path $assetDir "SubUtlSetup$version.exe"
          $portable = Join-Path $assetDir "SubUtl$version.exe"
          Copy-Item -LiteralPath $installerSource -Destination $installer -Force
          Copy-Item -LiteralPath $portableSource -Destination $portable -Force

          $notes = @"
          Windows distributables for AviUtl Subtitler $version.

          Files:
          - SubUtlSetup$version.exe: installer version. Installs per-user and adds a Windows uninstall entry.
          - SubUtl$version.exe: portable version. Runs without installation.

          The installer and portable app do not include large model files, llama.cpp server binaries, Python, FFmpeg, or user secrets. Those are managed from inside the app.
          "@
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notesPath -Value $notes -Encoding UTF8

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $installer $portable --clobber
          } else {
            gh release create $env:RELEASE_TAG $installer $portable --title "AviUtl Subtitler $env:RELEASE_TAG" --notes-file $notesPath
          }
