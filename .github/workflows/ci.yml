name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock-win.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock-win.txt
          python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check aviutl_subtitle.py subtitler tests

      - name: Mypy baseline
        run: python -m mypy

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Coverage baseline
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage xml
          python -m coverage html

      - name: Upload backend coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: |
            coverage.xml
            coverage-html/

  frontend:
    name: Frontend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend2/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint and formatting baseline
        working-directory: frontend
        run: |
          npm run lint
          npm run format:check

      - name: Release metadata tests
        working-directory: frontend
        run: npm run test:release-version

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Coverage baseline
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Dependency audit
        working-directory: frontend
        run: npm audit

      - name: Install frontend2 dependencies
        working-directory: frontend2
        run: npm ci

      - name: Frontend2 quality and unit tests
        working-directory: frontend2
        run: |
          npm run quality
          npm test
          npm run build

      - name: Frontend2 dependency audit
        working-directory: frontend2
        run: npm audit
